run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - errorlint
    - goimports
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam

linters-settings:
  revive:
    rules:
      - name: exported
        arguments: ["checkPrivateReceivers", "disableStutteringCheck"]
  gosec:
    excludes:
      - G104  # ignored errors (handled case by case)

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, gosec]
